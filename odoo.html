  <!DOCTYPE html>
  <html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMS — Inventory Management System</title>
    <meta name="description"
      content="A centralized, real-time Inventory Management System to replace manual registers and Excel sheets." />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ============================================
    DESIGN TOKENS
    ============================================ */
      :root {
        --c-bg: #0d0f14;
        --c-surface: #13161e;
        --c-surface-2: #1a1e2a;
        --c-surface-3: #20263a;
        --c-border: #252b3b;
        --c-border-light: #1e2435;

        --c-text: #e8eaf0;
        --c-text-2: #9aa0b4;
        --c-text-3: #636880;

        --c-accent: #6c63ff;
        --c-accent-glow: rgba(108, 99, 255, 0.25);
        --c-accent-2: #00d4aa;
        --c-accent-2-glow: rgba(0, 212, 170, 0.2);

        --c-danger: #ff5370;
        --c-danger-bg: rgba(255, 83, 112, 0.12);
        --c-warn: #f9b954;
        --c-warn-bg: rgba(249, 185, 84, 0.12);
        --c-success: #00d4aa;
        --c-success-bg: rgba(0, 212, 170, 0.12);
        --c-info: #5db0ff;
        --c-info-bg: rgba(93, 176, 255, 0.12);

        --sidebar-w: 240px;
        --topbar-h: 60px;
        --radius: 12px;
        --radius-sm: 8px;
        --radius-xs: 6px;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.25);

        --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }

      /* ============================================
    RESET & BASE
    ============================================ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 14px;
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font);
        background: var(--c-bg);
        color: var(--c-text);
        display: flex;
        min-height: 100vh;
        overflow: hidden;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      button {
        cursor: pointer;
        border: none;
        background: none;
        font-family: var(--font);
      }

      input,
      select,
      textarea {
        font-family: var(--font);
      }

      svg {
        flex-shrink: 0;
      }

      /* ============================================
    SIDEBAR
    ============================================ */
      .sidebar {
        width: var(--sidebar-w);
        min-height: 100vh;
        background: var(--c-surface);
        border-right: 1px solid var(--c-border);
        display: flex;
        flex-direction: column;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transition: transform var(--transition);
        overflow-y: auto;
        overflow-x: hidden;
      }

      .sidebar::-webkit-scrollbar {
        width: 4px;
      }

      .sidebar::-webkit-scrollbar-track {
        background: transparent;
      }

      .sidebar::-webkit-scrollbar-thumb {
        background: var(--c-border);
        border-radius: 4px;
      }

      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 16px 18px;
        border-bottom: 1px solid var(--c-border);
      }

      .brand-icon {
        width: 38px;
        height: 38px;
        background: linear-gradient(135deg, var(--c-accent), var(--c-accent-2));
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        box-shadow: 0 0 16px var(--c-accent-glow);
        flex-shrink: 0;
      }

      .brand-name {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: var(--c-text);
        display: block;
      }

      .brand-sub {
        font-size: 10px;
        font-weight: 600;
        color: var(--c-accent);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        display: block;
        margin-top: -2px;
      }

      .sidebar-nav {
        padding: 12px 10px;
        flex: 1;
      }

      .nav-section-label {
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--c-text-3);
        padding: 14px 10px 6px;
        text-transform: uppercase;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: var(--radius-sm);
        color: var(--c-text-2);
        font-size: 13.5px;
        font-weight: 500;
        transition: all var(--transition);
        position: relative;
        margin-bottom: 2px;
      }

      .nav-item:hover {
        background: var(--c-surface-2);
        color: var(--c-text);
      }

      .nav-item.active {
        background: var(--c-accent-glow);
        color: var(--c-accent);
        font-weight: 600;
      }

      .nav-item.active svg {
        stroke: var(--c-accent);
      }

      .nav-badge {
        margin-left: auto;
        background: var(--c-danger);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 20px;
        min-width: 18px;
        text-align: center;
      }

      .sidebar-footer {
        padding: 14px 16px;
        border-top: 1px solid var(--c-border);
      }

      .sidebar-footer-info {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--c-text-3);
      }

      .footer-dot {
        width: 7px;
        height: 7px;
        background: var(--c-success);
        border-radius: 50%;
        box-shadow: 0 0 6px var(--c-success);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {

        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.4;
        }
      }

      /* ============================================
    MAIN LAYOUT
    ============================================ */
      .main-wrap {
        margin-left: var(--sidebar-w);
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: hidden;
      }

      .topbar {
        height: var(--topbar-h);
        background: var(--c-surface);
        border-bottom: 1px solid var(--c-border);
        display: flex;
        align-items: center;
        padding: 0 24px;
        gap: 16px;
        position: sticky;
        top: 0;
        z-index: 50;
      }

      .sidebar-toggle {
        color: var(--c-text-2);
        padding: 6px;
        border-radius: var(--radius-xs);
        transition: all var(--transition);
        display: none;
      }

      .sidebar-toggle:hover {
        background: var(--c-surface-2);
        color: var(--c-text);
      }

      .topbar-breadcrumb {
        flex: 1;
        font-size: 15px;
        font-weight: 600;
        color: var(--c-text);
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .alert-bell {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-sm);
        color: var(--c-text-2);
        cursor: pointer;
        position: relative;
        transition: all var(--transition);
        background: var(--c-surface-2);
      }

      .alert-bell:hover {
        color: var(--c-text);
        background: var(--c-surface-3);
      }

      .bell-dot {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 8px;
        height: 8px;
        background: var(--c-danger);
        border-radius: 50%;
        border: 2px solid var(--c-surface);
      }

      .topbar-avatar {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, var(--c-accent), var(--c-accent-2));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
      }

      .content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 28px;
        background: var(--c-bg);
      }

      .content::-webkit-scrollbar {
        width: 6px;
      }

      .content::-webkit-scrollbar-track {
        background: transparent;
      }

      .content::-webkit-scrollbar-thumb {
        background: var(--c-border);
        border-radius: 4px;
      }

      /* ============================================
    PAGE HEADER
    ============================================ */
      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 24px;
        gap: 16px;
        flex-wrap: wrap;
      }

      .page-header-left h1 {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--c-text);
        margin-bottom: 4px;
      }

      .page-header-left p {
        font-size: 13px;
        color: var(--c-text-2);
      }

      .page-header-right {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      /* ============================================
    BUTTONS
    ============================================ */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 16px;
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 600;
        transition: all var(--transition);
        white-space: nowrap;
      }

      .btn-primary {
        background: var(--c-accent);
        color: #fff;
        box-shadow: 0 0 16px var(--c-accent-glow);
      }

      .btn-primary:hover {
        background: #7b73ff;
        box-shadow: 0 0 24px var(--c-accent-glow);
        transform: translateY(-1px);
      }

      .btn-secondary {
        background: var(--c-surface-2);
        color: var(--c-text-2);
        border: 1px solid var(--c-border);
      }

      .btn-secondary:hover {
        background: var(--c-surface-3);
        color: var(--c-text);
      }

      .btn-danger {
        background: var(--c-danger-bg);
        color: var(--c-danger);
        border: 1px solid rgba(255, 83, 112, 0.2);
      }

      .btn-danger:hover {
        background: rgba(255, 83, 112, 0.25);
      }

      .btn-success {
        background: var(--c-success-bg);
        color: var(--c-success);
        border: 1px solid rgba(0, 212, 170, 0.2);
      }

      .btn-success:hover {
        background: rgba(0, 212, 170, 0.25);
      }

      .btn-sm {
        padding: 6px 11px;
        font-size: 12px;
      }

      .btn-icon {
        padding: 7px;
      }

      /* ============================================
    KPI CARDS
    ============================================ */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }

      .kpi-card {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        transition: all var(--transition);
        position: relative;
        overflow: hidden;
      }

      .kpi-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--kpi-color, var(--c-accent));
      }

      .kpi-card:hover {
        border-color: var(--c-border-light);
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
      }

      .kpi-icon {
        width: 42px;
        height: 42px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--kpi-bg, var(--c-accent-glow));
        color: var(--kpi-color, var(--c-accent));
        flex-shrink: 0;
      }

      .kpi-info {
        flex: 1;
        min-width: 0;
      }

      .kpi-value {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -1px;
        color: var(--c-text);
        line-height: 1.1;
      }

      .kpi-label {
        font-size: 12px;
        color: var(--c-text-2);
        margin-top: 4px;
        font-weight: 500;
      }

      .kpi-change {
        font-size: 11px;
        font-weight: 600;
        margin-top: 6px;
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }

      .kpi-change.up {
        color: var(--c-success);
      }

      .kpi-change.down {
        color: var(--c-danger);
      }

      /* ============================================
    CARDS / PANELS
    ============================================ */
      .card {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .card-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--c-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--c-text);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-body {
        padding: 20px;
      }

      /* ============================================
    DATA TABLES
    ============================================ */
      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      thead th {
        padding: 10px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--c-text-3);
        background: var(--c-surface-2);
        border-bottom: 1px solid var(--c-border);
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
      }

      thead th:hover {
        color: var(--c-text-2);
      }

      thead th.sort-asc::after {
        content: ' ↑';
        color: var(--c-accent);
      }

      thead th.sort-desc::after {
        content: ' ↓';
        color: var(--c-accent);
      }

      tbody tr {
        border-bottom: 1px solid var(--c-border-light);
        transition: background var(--transition);
      }

      tbody tr:hover {
        background: var(--c-surface-2);
      }

      tbody tr:last-child {
        border-bottom: none;
      }

      tbody td {
        padding: 11px 14px;
        color: var(--c-text);
        vertical-align: middle;
      }

      .td-muted {
        color: var(--c-text-2);
        font-size: 12px;
      }

      .td-actions {
        display: flex;
        gap: 6px;
      }

      .action-btn {
        width: 30px;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-xs);
        transition: all var(--transition);
        font-size: 12px;
      }

      .action-btn-edit {
        background: var(--c-info-bg);
        color: var(--c-info);
      }

      .action-btn-edit:hover {
        background: rgba(93, 176, 255, 0.3);
      }

      .action-btn-del {
        background: var(--c-danger-bg);
        color: var(--c-danger);
      }

      .action-btn-del:hover {
        background: rgba(255, 83, 112, 0.3);
      }

      .action-btn-view {
        background: var(--c-surface-3);
        color: var(--c-text-2);
      }

      .action-btn-view:hover {
        background: var(--c-surface-3);
        color: var(--c-text);
      }

      /* ============================================
    BADGES / STATUS
    ============================================ */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .badge-success {
        background: var(--c-success-bg);
        color: var(--c-success);
      }

      .badge-danger {
        background: var(--c-danger-bg);
        color: var(--c-danger);
      }

      .badge-warn {
        background: var(--c-warn-bg);
        color: var(--c-warn);
      }

      .badge-info {
        background: var(--c-info-bg);
        color: var(--c-info);
      }

      .badge-muted {
        background: var(--c-surface-3);
        color: var(--c-text-2);
      }

      .badge-accent {
        background: var(--c-accent-glow);
        color: var(--c-accent);
      }

      /* ============================================
    FORMS
    ============================================ */
      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-group.full {
        grid-column: 1 / -1;
      }

      .form-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--c-text-2);
        letter-spacing: 0.3px;
      }

      .form-control {
        background: var(--c-surface-2);
        border: 1px solid var(--c-border);
        border-radius: var(--radius-xs);
        color: var(--c-text);
        padding: 9px 12px;
        font-size: 13px;
        outline: none;
        transition: all var(--transition);
        width: 100%;
      }

      .form-control:focus {
        border-color: var(--c-accent);
        box-shadow: 0 0 0 3px var(--c-accent-glow);
      }

      .form-control::placeholder {
        color: var(--c-text-3);
      }

      textarea.form-control {
        resize: vertical;
        min-height: 80px;
      }

      select.form-control option {
        background: var(--c-surface-2);
        color: var(--c-text);
      }

      /* ============================================
    SEARCH & FILTER BAR
    ============================================ */
      .filter-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--radius-sm);
        padding: 0 12px;
        flex: 1;
        min-width: 200px;
        transition: all var(--transition);
      }

      .search-box:focus-within {
        border-color: var(--c-accent);
        box-shadow: 0 0 0 3px var(--c-accent-glow);
      }

      .search-box svg {
        color: var(--c-text-3);
        flex-shrink: 0;
      }

      .search-box input {
        background: none;
        border: none;
        outline: none;
        color: var(--c-text);
        font-size: 13px;
        padding: 9px 0;
        flex: 1;
      }

      .search-box input::placeholder {
        color: var(--c-text-3);
      }

      .filter-select {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--radius-sm);
        color: var(--c-text-2);
        padding: 9px 12px;
        font-size: 13px;
        outline: none;
        cursor: pointer;
        transition: all var(--transition);
      }

      .filter-select:focus {
        border-color: var(--c-accent);
      }

      /* ============================================
    PAGINATION
    ============================================ */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-top: 1px solid var(--c-border);
        font-size: 12px;
        color: var(--c-text-2);
      }

      .pagination-controls {
        display: flex;
        gap: 4px;
      }

      .page-btn {
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-xs);
        font-size: 12px;
        font-weight: 600;
        background: var(--c-surface-2);
        color: var(--c-text-2);
        transition: all var(--transition);
      }

      .page-btn:hover {
        background: var(--c-surface-3);
        color: var(--c-text);
      }

      .page-btn.active {
        background: var(--c-accent);
        color: #fff;
      }

      .page-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* ============================================
    MODAL
    ============================================ */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        visibility: hidden;
        transition: all var(--transition);
      }

      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .modal {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: 16px;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow);
        transform: scale(0.95) translateY(10px);
        transition: transform var(--transition);
      }

      .modal-overlay.active .modal {
        transform: scale(1) translateY(0);
      }

      .modal-lg {
        max-width: 800px;
      }

      .modal-header {
        padding: 18px 22px;
        border-bottom: 1px solid var(--c-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .modal-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--c-text);
      }

      .modal-close {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-xs);
        color: var(--c-text-3);
        font-size: 20px;
        font-weight: 300;
        transition: all var(--transition);
        line-height: 1;
      }

      .modal-close:hover {
        background: var(--c-surface-2);
        color: var(--c-text);
      }

      .modal-body {
        padding: 22px;
        overflow-y: auto;
        flex: 1;
      }

      .modal-body::-webkit-scrollbar {
        width: 4px;
      }

      .modal-body::-webkit-scrollbar-thumb {
        background: var(--c-border);
        border-radius: 4px;
      }

      .modal-footer {
        padding: 16px 22px;
        border-top: 1px solid var(--c-border);
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      /* ============================================
    TOASTS
    ============================================ */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 300;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }

      .toast {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--radius-sm);
        padding: 13px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 280px;
        max-width: 360px;
        box-shadow: var(--shadow);
        pointer-events: all;
        transform: translateX(120%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 13px;
        border-left: 3px solid var(--toast-color, var(--c-accent));
      }

      .toast.show {
        transform: translateX(0);
      }

      .toast-icon {
        flex-shrink: 0;
        color: var(--toast-color, var(--c-accent));
      }

      .toast-message {
        flex: 1;
        color: var(--c-text);
        font-weight: 500;
      }

      /* ============================================
    CHARTS
    ============================================ */
      .charts-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      .chart-wrap {
        position: relative;
        padding: 20px;
      }

      .chart-wrap canvas {
        max-height: 240px;
      }

      /* ============================================
    STOCK LEVEL INDICATORS
    ============================================ */
      .stock-bar {
        height: 4px;
        background: var(--c-surface-3);
        border-radius: 4px;
        overflow: hidden;
        width: 80px;
      }

      .stock-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
      }

      /* ============================================
    EMPTY STATE
    ============================================ */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--c-text-3);
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        display: block;
        opacity: 0.4;
      }

      .empty-state h3 {
        color: var(--c-text-2);
        font-size: 15px;
        margin-bottom: 6px;
      }

      .empty-state p {
        font-size: 13px;
      }

      /* ============================================
    LOADING
    ============================================ */
      .loading-spinner {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 200px;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--c-border);
        border-top-color: var(--c-accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ============================================
    LINE ITEMS (Purchase / Sale)
    ============================================ */
      .line-items-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 12px;
      }

      .line-items-table th {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--c-text-3);
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid var(--c-border);
        background: var(--c-surface-2);
      }

      .line-items-table td {
        padding: 8px 10px;
        vertical-align: middle;
      }

      .line-items-table tbody tr {
        border-bottom: 1px solid var(--c-border-light);
      }

      /* ============================================
    ALERT PANEL
    ============================================ */
      .alert-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .alert-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 14px;
        background: var(--c-danger-bg);
        border: 1px solid rgba(255, 83, 112, 0.2);
        border-radius: var(--radius-sm);
        font-size: 13px;
      }

      .alert-item.warn {
        background: var(--c-warn-bg);
        border-color: rgba(249, 185, 84, 0.2);
      }

      .alert-item-icon {
        color: var(--c-danger);
        flex-shrink: 0;
      }

      .alert-item.warn .alert-item-icon {
        color: var(--c-warn);
      }

      .alert-item-info {
        flex: 1;
      }

      .alert-item-name {
        font-weight: 600;
        color: var(--c-text);
      }

      .alert-item-sub {
        font-size: 11px;
        color: var(--c-text-2);
        margin-top: 1px;
      }

      /* ============================================
    DASHBOARD GRID
    ============================================ */
      .dashboard-bottom-grid {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 16px;
      }

      /* ============================================
    STATS / SUMMARY ROWS
    ============================================ */
      .summary-row {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 20px;
        padding: 12px 0 0;
        border-top: 1px solid var(--c-border);
        margin-top: 12px;
        font-size: 13px;
      }

      .summary-item {
        color: var(--c-text-2);
      }

      .summary-item strong {
        color: var(--c-text);
        font-weight: 700;
      }

      .summary-total {
        font-size: 15px;
        font-weight: 800;
        color: var(--c-text);
      }

      /* ============================================
    TABS
    ============================================ */
      .tabs {
        display: flex;
        gap: 4px;
        border-bottom: 1px solid var(--c-border);
        margin-bottom: 20px;
      }

      .tab-btn {
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        color: var(--c-text-2);
        border-bottom: 2px solid transparent;
        transition: all var(--transition);
        margin-bottom: -1px;
      }

      .tab-btn.active {
        color: var(--c-accent);
        border-bottom-color: var(--c-accent);
      }

      .tab-btn:hover {
        color: var(--c-text);
      }

      /* ============================================
    RESPONSIVE
    ============================================ */
      @media (max-width: 900px) {
        .sidebar {
          transform: translateX(-100%);
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .main-wrap {
          margin-left: 0;
        }

        .sidebar-toggle {
          display: flex;
        }

        .charts-grid {
          grid-template-columns: 1fr;
        }

        .dashboard-bottom-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 600px) {
        .content {
          padding: 16px;
        }

        .kpi-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      /* ============================================
    PAGE ANIMATIONS
    ============================================ */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .page-anim {
        animation: fadeInUp 0.3s ease forwards;
      }

      /* ============================================
    MISC UTILITIES
    ============================================ */
      .text-accent {
        color: var(--c-accent);
      }

      .text-success {
        color: var(--c-success);
      }

      .text-danger {
        color: var(--c-danger);
      }

      .text-warn {
        color: var(--c-warn);
      }

      .text-muted {
        color: var(--c-text-2);
      }

      .font-bold {
        font-weight: 700;
      }

      .font-mono {
        font-family: 'Roboto Mono', monospace;
        font-size: 12px;
      }

      .flex {
        display: flex;
      }

      .flex-center {
        display: flex;
        align-items: center;
      }

      .gap-2 {
        gap: 8px;
      }

      .gap-3 {
        gap: 12px;
      }

      .mt-1 {
        margin-top: 6px;
      }

      .mt-2 {
        margin-top: 12px;
      }

      .mb-2 {
        margin-bottom: 12px;
      }

      .mb-3 {
        margin-bottom: 16px;
      }

      .w-full {
        width: 100%;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--c-border);
        margin: 16px 0;
      }

      .color-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }

      hr.section-divider {
        border: none;
        border-top: 1px solid var(--c-border);
        margin: 20px 0;
      }

       * db.js — localStorage-based data store for StockPulse IMS
       * Collections: products, categories, suppliers, purchaseOrders, stockMovements, sales, settings
       */

      const DB = (() => {
        const PREFIX = 'ims_';
        const COLLECTIONS = ['products', 'categories', 'suppliers', 'purchaseOrders', 'stockMovements', 'sales', 'settings'];

        function _key(col) { return PREFIX + col; }
        function _get(col) {
          try { return JSON.parse(localStorage.getItem(_key(col))) || []; } catch { return []; }
        }
        function _set(col, data) { localStorage.setItem(_key(col), JSON.stringify(data)); }
        function _id() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

        const api = {
          getAll: (col) => _get(col),
          getById: (col, id) => _get(col).find(r => r.id === id) || null,

          add: (col, record) => {
            const data = _get(col);
            const item = { ...record, id: _id(), createdAt: new Date().toISOString() };
            data.push(item);
            _set(col, data);
            return item;
          },

          update: (col, id, changes) => {
            const data = _get(col);
            const idx = data.findIndex(r => r.id === id);
            if (idx === -1) return null;
            data[idx] = { ...data[idx], ...changes, updatedAt: new Date().toISOString() };
            _set(col, data);
            return data[idx];
          },

          remove: (col, id) => {
            const data = _get(col);
            _set(col, data.filter(r => r.id !== id));
          },

          query: (col, predicate) => _get(col).filter(predicate),

          getSettings: () => {
            const s = localStorage.getItem(PREFIX + 'app_settings');
            return s ? JSON.parse(s) : {
              businessName: 'StockPulse IMS',
              currency: '₹',
              taxPct: 18,
              lowStockThreshold: 10
            };
          },
          saveSettings: (obj) => {
            localStorage.setItem(PREFIX + 'app_settings', JSON.stringify(obj));
          },

          clearAll: () => {
            COLLECTIONS.forEach(c => localStorage.removeItem(_key(c)));
            localStorage.removeItem(PREFIX + 'app_settings');
            localStorage.removeItem(PREFIX + 'seeded');
          },

          exportAll: () => {
            const out = { settings: DB.getSettings() };
            COLLECTIONS.forEach(c => out[c] = _get(c));
            return JSON.stringify(out, null, 2);
          },

          importAll: (jsonStr) => {
            const data = JSON.parse(jsonStr);
            if (data.settings) DB.saveSettings(data.settings);
            COLLECTIONS.forEach(c => { if (data[c]) _set(c, data[c]); });
          },

          // Log a stock movement helper
          logMovement: (type, productId, productName, qty, ref, note) => {
            return DB.add('stockMovements', { type, productId, productName, qty, ref, note, date: new Date().toISOString() });

    <script>

          const top8 = [...prods].sort((a, b) => b.quantity - a.quantity).slice(0, 8);

                  <div style="flex:1;height:4px;background:var(--c-surface-3);border-radius:4px">
                    <div style="width:${totalVal > 0 ? Math.round((p.value / totalVal) * 100) : 0}%;height:100%;background:var(--c-accent);border-radius:4px"></div>
                  </div>
                  <span style="font-size:11px;color:var(--c-text-2)">${totalVal > 0 ? ((p.value / totalVal) * 100).toFixed(1) : 0}%</span>
                </div>
              </td>
            </tr>`).join('')}
            </tbody>
          </table></div>`;
          } else if (tab === 'lowstock') {
            const low = prods.filter(p => p.quantity <= thr).sort((a, b) => a.quantity - b.quantity);
            content = `
          <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
            <span style="color:var(--c-text-2);font-size:13px">${low.length} product${low.length !== 1 ? 's' : ''} at or below threshold of <strong>${thr}</strong> units</span>
            <button class="btn btn-secondary btn-sm" id="expLow">⬇ Export CSV</button>
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>Product</th><th>SKU</th><th>Category</th><th>Current Qty</th><th>Reorder Level</th><th>Deficit</th><th>Status</th></tr></thead>
            <tbody>${low.length ? low.map(p => `<tr>
              <td><strong>${escHtml(p.name)}</strong></td>
              <td class="td-muted font-mono">${escHtml(p.sku || '—')}</td>
              <td class="td-muted">${escHtml(p.categoryName || '—')}</td>
              <td class="${p.quantity === 0 ? 'text-danger' : 'text-warn'}" style="font-weight:700">${p.quantity}</td>
              <td class="td-muted">${p.reorderLevel}</td>
              <td class="text-danger" style="font-weight:600">${Math.max(0, p.reorderLevel - p.quantity)}</td>
              <td>${fmt.stockBadge(p.quantity, p.reorderLevel)}</td>
            </tr>`).join('') : '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--c-text-3)">✅ All products above threshold</td></tr>'}
            </tbody>
          </table></div>`;
          } else if (tab === 'movements') {
            const byProduct = {};
            mvs.forEach(m => {
              if (!byProduct[m.productId]) byProduct[m.productId] = { name: m.productName, inQty: 0, outQty: 0, adjQty: 0, count: 0 };
              if (m.type === 'in') byProduct[m.productId].inQty += m.qty;
              else if (m.type === 'out') byProduct[m.productId].outQty += Math.abs(m.qty);
              else byProduct[m.productId].adjQty += m.qty;
              byProduct[m.productId].count++;
            });
            const rows = Object.values(byProduct).sort((a, b) => b.count - a.count);
            content = `
          <div class="table-wrap"><table>
            <thead><tr><th>Product</th><th>Total Movements</th><th>Stock In</th><th>Stock Out</th><th>Adjustments</th><th>Net Flow</th></tr></thead>
            <tbody>${rows.length ? rows.map(r => `<tr>
              <td><strong>${escHtml(r.name)}</strong></td>
              <td><span class="badge badge-muted">${r.count}</span></td>
              <td class="text-success">+${fmt.number(r.inQty)}</td>
              <td class="text-danger">-${fmt.number(r.outQty)}</td>
              <td class="text-warn">${r.adjQty >= 0 ? '+' : ''}${fmt.number(r.adjQty)}</td>
              <td class="${(r.inQty - r.outQty + r.adjQty) >= 0 ? 'text-success' : 'text-danger'}" style="font-weight:700">${(r.inQty - r.outQty + r.adjQty) >= 0 ? '+' : ''}${fmt.number(r.inQty - r.outQty + r.adjQty)}</td>
            </tr>`).join('') : '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--c-text-3)">No movement data</td></tr>'}
            </tbody>
          </table></div>`;
          } else if (tab === 'topvalue') {
            const rows = prods.map(p => ({ ...p, value: p.quantity * p.sellPrice })).sort((a, b) => b.value - a.value).slice(0, 10);
            content = `
          <div class="table-wrap"><table>
            <thead><tr><th>Rank</th><th>Product</th><th>Qty</th><th>Sell Price</th><th>Stock Value (Sell)</th><th>Profit Potential</th></tr></thead>
            <tbody>${rows.map((p, i) => `<tr>
              <td><strong style="color:${i === 0 ? '#f9b954' : i === 1 ? '#9aa0b4' : i === 2 ? '#cd7f32' : 'var(--c-text-3)'}">#${i + 1}</strong></td>
              <td><strong>${escHtml(p.name)}</strong><br><span class="td-muted">${escHtml(p.categoryName || '—')}</span></td>
              <td>${fmt.number(p.quantity)}</td>
              <td>${fmt.currency(p.sellPrice)}</td>
              <td class="text-accent" style="font-weight:700">${fmt.currency(p.value)}</td>
              <td class="text-success">${fmt.currency(p.quantity * (p.sellPrice - p.costPrice))}</td>
            </tr>`).join('')}
            </tbody>
          </table></div>`;
          }

          el.innerHTML = `
  <div class="page-header">
    <div class="page-header-left"><h1>Reports</h1><p>Inventory analytics and insights</p></div>
  </div>
  <div class="tabs">
    ${tabs.map(([k, l]) => `<button class="tab-btn${tab === k ? ' active' : ''}" data-tab="${k}">${l}</button>`).join('')}
  </div>
  <div class="card"><div class="card-body" id="rptContent">${content}</div></div>`;

          el.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { this._tab = b.dataset.tab; this.draw(); });

          const expVal = el.querySelector('#expVal');
          if (expVal) expVal.onclick = () => {
            const rows = [['SKU', 'Product', 'Category', 'Qty', 'Cost Price', 'Total Value'],
            ...prods.map(p => [p.sku || '', p.name, p.categoryName || '', p.quantity, p.costPrice, (p.quantity * p.costPrice).toFixed(2)])];
            csvDownload(rows, 'stock-valuation.csv'); Toast.success('Exported');
          };
          const expLow = el.querySelector('#expLow');
          if (expLow) expLow.onclick = () => {
            const low = prods.filter(p => p.quantity <= thr);
            csvDownload([['Product', 'SKU', 'Qty', 'Reorder Level'], ...low.map(p => [p.name, p.sku || '', p.quantity, p.reorderLevel])], 'low-stock.csv');
            Toast.success('Exported');
          };
        }
      };

    </script>
    <script>
      const Settings = {
        render(el) { this._el = el; this.draw(); },
        draw() {
          const el = this._el;
          const s = DB.getSettings();
          el.innerHTML = `
  <div class="page-header">
    <div class="page-header-left"><h1>Settings</h1><p>Configure your business and app preferences</p></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-header"><span class="card-title">Business Settings</span></div>
      <div class="card-body">
        <div class="form-group mb-3">
          <label class="form-label">Business Name</label>
          <input class="form-control" id="sBizName" value="${escHtml(s.businessName || 'StockPulse IMS')}" placeholder="Your Business Name">
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Currency Symbol</label>
          <input class="form-control" id="sCur" value="${escHtml(s.currency || '₹')}" placeholder="₹ $ € £">
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Default Tax %</label>
          <input class="form-control" type="number" id="sTax" value="${s.taxPct || 18}" min="0" max="100">
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Low Stock Alert Threshold</label>
          <input class="form-control" type="number" id="sThresh" value="${s.lowStockThreshold || 10}" min="1">
          <small style="color:var(--c-text-3);font-size:11px;margin-top:4px;display:block">Products at or below this quantity trigger low stock alerts</small>
        </div>
        <button class="btn btn-primary" id="saveSettings">Save Settings</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <div class="card-header"><span class="card-title">Data Management</span></div>
        <div class="card-body">
          <p style="font-size:13px;color:var(--c-text-2);margin-bottom:16px">Export your data as JSON for backup, or import a previously exported file.</p>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-secondary" id="expData">⬇ Export JSON</button>
            <button class="btn btn-secondary" id="impBtn">⬆ Import JSON</button>
            <input type="file" id="impFile" accept=".json" style="display:none">
          </div>
        </div>
      </div>
      <div class="card" style="border-color:rgba(255,83,112,.3)">
        <div class="card-header"><span class="card-title" style="color:var(--c-danger)">Danger Zone</span></div>
        <div class="card-body">
          <p style="font-size:13px;color:var(--c-text-2);margin-bottom:16px">⚠ This will permanently delete ALL inventory data including products, orders, and movement history.</p>
          <button class="btn btn-danger" id="clearAll">🗑 Clear All Data</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">About StockPulse IMS</span></div>
        <div class="card-body">
          <p style="font-size:13px;color:var(--c-text-2);line-height:1.7">
            <strong style="color:var(--c-text)">StockPulse IMS</strong> v1.0<br>
            A modular, offline-first Inventory Management System.<br>
            All data is stored locally in your browser's localStorage.
          </p>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
            ${[['Products', DB.getAll('products').length, '#6c63ff'], ['Categories', DB.getAll('categories').length, '#00d4aa'], ['Suppliers', DB.getAll('suppliers').length, '#5db0ff'], ['POs', DB.getAll('purchaseOrders').length, '#f9b954'], ['Sales', DB.getAll('sales').length, '#ff5370']].map(([l, v, c]) => `
            <div style="background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:8px;padding:10px 14px;text-align:center">
              <div style="font-size:18px;font-weight:800;color:${c}">${v}</div>
              <div style="font-size:11px;color:var(--c-text-3)">${l}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>`;

          el.querySelector('#saveSettings').onclick = () => {
            const name = document.getElementById('sBizName').value.trim();
            if (!name) return Toast.error('Business name required');
            DB.saveSettings({
              businessName: name,
              currency: document.getElementById('sCur').value || '₹',
              taxPct: parseFloat(document.getElementById('sTax').value) || 18,
              lowStockThreshold: parseInt(document.getElementById('sThresh').value) || 10
            });
            document.getElementById('footer-biz-name').textContent = name;
            Toast.success('Settings saved'); App.updateBadges();
          };

          el.querySelector('#expData').onclick = () => {
            const blob = new Blob([DB.exportAll()], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ims-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click(); URL.revokeObjectURL(a.href);
            Toast.success('Data exported');
          };

          el.querySelector('#impBtn').onclick = () => el.querySelector('#impFile').click();
          el.querySelector('#impFile').onchange = e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
              try {
                DB.importAll(ev.target.result);
                Toast.success('Data imported successfully'); this.draw();
              } catch { Toast.error('Invalid JSON file'); }
            };
            reader.readAsText(file);
          };

          el.querySelector('#clearAll').onclick = () => Modal.confirm({
            title: 'Clear All Data', danger: true,
            message: 'This will <strong>permanently delete all</strong> products, orders, sales, movements, and settings. This cannot be undone.',
            onConfirm: () => { DB.clearAll(); Toast.warn('All data cleared'); this.draw(); App.updateBadges(); }
          });
        }
      };

    </script>
    <script>
      /**
       * app.js — SPA Router, Toast System, Modal Factory, Shared Utilities
       */

      // ─── ROUTER ──────────────────────────────────────────────────────────────────
      const App = (() => {
        const content = document.getElementById('content');
        const pageTitle = document.getElementById('page-title');
        const navItems = document.querySelectorAll('.nav-item[data-page]');

        const PAGES = {
          dashboard: { title: 'Dashboard', render: (el) => Dashboard.render(el) },
          products: { title: 'Products', render: (el) => Products.render(el) },
          categories: { title: 'Categories', render: (el) => Categories.render(el) },
          suppliers: { title: 'Suppliers', render: (el) => Suppliers.render(el) },
          purchases: { title: 'Purchase Orders', render: (el) => Purchases.render(el) },
          sales: { title: 'Sales / Dispatch', render: (el) => Sales.render(el) },
          movements: { title: 'Stock Movements', render: (el) => Movements.render(el) },
          reports: { title: 'Reports', render: (el) => Reports.render(el) },
          settings: { title: 'Settings', render: (el) => Settings.render(el) },
        };

        let currentPage = null;

        function navigate(page) {
          if (!PAGES[page]) page = 'dashboard';
          currentPage = page;

          navItems.forEach(el => {
            el.classList.toggle('active', el.dataset.page === page);
          });

          pageTitle.textContent = PAGES[page].title;
          content.innerHTML = '';
          const wrap = document.createElement('div');
          wrap.className = 'page-anim';
          content.appendChild(wrap);
          PAGES[page].render(wrap);
          updateBadges();
          updateBellDot();

          const settings = DB.getSettings();
          document.getElementById('footer-biz-name').textContent = settings.businessName || 'StockPulse IMS';
        }

        function updateBadges() {
          const settings = DB.getSettings();
          const threshold = settings.lowStockThreshold || 10;
          const products = DB.getAll('products');
          const lowCount = products.filter(p => p.quantity <= threshold).length;
          const badge = document.getElementById('badge-products');
          if (badge) {
            badge.textContent = lowCount > 0 ? lowCount : '';
            badge.style.display = lowCount > 0 ? 'inline' : 'none';
          }
        }

        function updateBellDot() {
          const settings = DB.getSettings();
          const threshold = settings.lowStockThreshold || 10;
          const products = DB.getAll('products');
          const hasAlerts = products.some(p => p.quantity <= threshold);
          const dot = document.getElementById('bellDot');
          if (dot) dot.style.display = hasAlerts ? 'block' : 'none';
        }

        function init() {
          navItems.forEach(el => {
            el.addEventListener('click', e => {
              e.preventDefault();
              navigate(el.dataset.page);
            });
          });

          document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
          });

          document.getElementById('alertBell').addEventListener('click', () => navigate('reports'));

          navigate('dashboard');
        }

        return { init, navigate, updateBadges };
      })();

      // ─── TOAST ────────────────────────────────────────────────────────────────────
      const Toast = (() => {
        const container = document.getElementById('toastContainer');

        const ICONS = {
          success: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
          error: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
          info: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
          warning: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><triangle points="10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        };
        const COLORS = { success: 'var(--c-success)', error: 'var(--c-danger)', warning: 'var(--c-warn)', info: 'var(--c-info)' };

        function show(message, type = 'success', duration = 3500) {
          const t = document.createElement('div');
          t.className = 'toast';
          t.style.setProperty('--toast-color', COLORS[type] || COLORS.info);
          t.innerHTML = `<span class="toast-icon">${ICONS[type] || ICONS.info}</span><span class="toast-message">${message}</span>`;
          container.appendChild(t);
          requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
          setTimeout(() => {
            t.classList.remove('show');
            setTimeout(() => t.remove(), 400);
          }, duration);
        }

        return {
          success: (msg) => show(msg, 'success'),
          error: (msg) => show(msg, 'error', 5000),
          warn: (msg) => show(msg, 'warning'),
          info: (msg) => show(msg, 'info'),
        };
      })();

      // ─── MODAL ────────────────────────────────────────────────────────────────────
      const Modal = (() => {
        const overlay = document.getElementById('modalOverlay');
        const modal = document.getElementById('modal');
        const titleEl = document.getElementById('modalTitle');
        const bodyEl = document.getElementById('modalBody');
        const footerEl = document.getElementById('modalFooter');
        const closeBtn = document.getElementById('modalClose');

        closeBtn.addEventListener('click', close);
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

        function open({ title, body, footer, size }) {
          titleEl.textContent = title || '';
          bodyEl.innerHTML = typeof body === 'string' ? body : '';
          if (body instanceof HTMLElement) { bodyEl.innerHTML = ''; bodyEl.appendChild(body); }
          footerEl.innerHTML = typeof footer === 'string' ? footer : '';
          if (footer instanceof HTMLElement) { footerEl.innerHTML = ''; footerEl.appendChild(footer); }
          modal.className = 'modal' + (size === 'lg' ? ' modal-lg' : '');
          overlay.classList.add('active');
        }

        function close() { overlay.classList.remove('active'); }

        function confirm({ title = 'Confirm', message, onConfirm, danger }) {
          open({
            title,
            body: `<p style="color:var(--c-text-2);font-size:14px;line-height:1.6">${message}</p>`,
            footer: `
          <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
          <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="confirmOk">${danger ? 'Delete' : 'Confirm'}</button>
        `
          });
          document.getElementById('confirmCancel').onclick = close;
          document.getElementById('confirmOk').onclick = () => { close(); onConfirm(); };
        }

        return { open, close, confirm };
      })();

      // ─── HELPERS ─────────────────────────────────────────────────────────────────
      const fmt = {
        currency: (n) => {
          const s = DB.getSettings();
          return `${s.currency || '₹'}${Number(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        },
        date: (iso) => {
          if (!iso) return '—';
          return new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        },
        number: (n) => Number(n || 0).toLocaleString('en-IN'),
        stockBadge: (qty, reorder) => {
          if (qty === 0) return `<span class="badge badge-danger">Out of Stock</span>`;
          if (qty <= reorder) return `<span class="badge badge-warn">Low Stock</span>`;
          return `<span class="badge badge-success">In Stock</span>`;
        },
        movBadge: (type) => {
          const map = {
            in: '<span class="badge badge-success">▲ Stock In</span>',
            out: '<span class="badge badge-danger">▼ Stock Out</span>',
            adjustment: '<span class="badge badge-warn">~ Adjustment</span>',
          };
          return map[type] || `<span class="badge badge-muted">${type}</span>`;
        },
        statusBadge: (st) => {
          const map = {
            draft: '<span class="badge badge-muted">Draft</span>',
            ordered: '<span class="badge badge-info">Ordered</span>',
            received: '<span class="badge badge-success">Received</span>',
            dispatched: '<span class="badge badge-success">Dispatched</span>',
            processing: '<span class="badge badge-warn">Processing</span>',
            active: '<span class="badge badge-success">Active</span>',
            inactive: '<span class="badge badge-muted">Inactive</span>',
          };
          return map[st] || `<span class="badge badge-muted">${st}</span>`;
        }
      };

      function stockBarHTML(qty, reorder) {
        const max = Math.max(qty, reorder * 2, 1);
        const pct = Math.min(100, Math.round((qty / max) * 100));
        const color = qty === 0 ? 'var(--c-danger)' : qty <= reorder ? 'var(--c-warn)' : 'var(--c-success)';
        return `<div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
      }

      function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function csvDownload(rows, filename) {
        const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
      }

      
  // ── AUTH ──────────────────────────────────────────
  const Auth = (() => {
    const DEFAULT_USER = 'admin';
    const DEFAULT_PASS = 'admin123';

    function getCredentials() {
      const s = DB.getSettings();
      return { username: s.authUsername || DEFAULT_USER, password: s.authPassword || DEFAULT_PASS };
    }

    function isLoggedIn() { return sessionStorage.getItem('ims_auth') === '1'; }

    function login(user, pass) {
      const creds = getCredentials();
      return user === creds.username && pass === creds.password;
    }

    function logout() {
      sessionStorage.removeItem('ims_auth');
      showLogin();
    }

    function showLogin() {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.querySelector('.sidebar').style.display = 'none';
      document.querySelector('.main-wrap').style.display = 'none';
    }

    function showApp() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.querySelector('.sidebar').style.display = '';
      document.querySelector('.main-wrap').style.display = '';
    }

    function init() {
      if (isLoggedIn()) { showApp(); return; }
      showLogin();

      const form = document.getElementById('loginForm');
      const errEl = document.getElementById('loginError');

      form.addEventListener('submit', e => {
        e.preventDefault();
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value;
        const btn = document.getElementById('loginBtnText');

        if (!user || !pass) {
          errEl.style.display = 'flex';
          errEl.textContent = 'Please enter both username and password.';
          return;
        }

        btn.textContent = 'Signing in…';
        setTimeout(() => {
          if (login(user, pass)) {
            sessionStorage.setItem('ims_auth', '1');
            errEl.style.display = 'none';
            showApp();
            App.init();
          } else {
            errEl.style.display = 'flex';
            errEl.textContent = '⚠ Invalid username or password. Try admin / admin123';
            btn.textContent = 'Sign In';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginPass').focus();
          }
        }, 400);
      });

      // Password toggle
      const toggle = document.getElementById('togglePass');
      const passInput = document.getElementById('loginPass');
      if (toggle) toggle.onclick = () => {
        const isText = passInput.type === 'text';
        passInput.type = isText ? 'password' : 'text';
        toggle.style.color = isText ? '#636880' : '#6c63ff';
      };
    }

    return { init, logout, isLoggedIn };
  })();
  // ─── INIT ────────────────────────────────────────────────────────────────────
      document.addEventListener('DOMContentLoaded', () => Auth.init());

    </script>
  </body>
